<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ETAPAS DE PROCESOS DE COMPRAS 2026</title>

    <link rel="icon" href="https://raw.githubusercontent.com/ComprasMasachapa/etapas-procesos-administrativos-centro-de-salud-masachapa/dc9cf2f07a7a2f8569bc530721e816bb739cb1ea/ICON%20PAGES.png" type="image/png">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Roboto',sans-serif;
    background: linear-gradient(120deg, #f0f4f8, #e0f7fa);
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* --- BIENVENIDA --- */

#bienvenida{
    position:fixed;
    width:100%;
    height:100%;
    background: linear-gradient(120deg, #004d40, #00796b);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.bienvenida-box{
    background:white;
    border-radius:25px;
    width:90%;
    max-width:1100px;
    min-height:300px;
    padding:60px 40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
    animation:aparecer 0.5s ease;
}

.bienvenida-box h2{
    font-size:1.8em;
    margin:20px 0;
    color:#00796b;
    text-align:center;
}

.bienvenida-box button{
    width:60%;
    max-width:400px;
    padding:15px;
    font-size:1em;
    border:none;
    border-radius:10px;
    background:#00796b;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.bienvenida-box button:hover{
    background:#004d40;
}

.bienvenida-logo{
    width:120%;
    max-width:1100px;
    height:auto;
}

@keyframes aparecer{
    from{
        transform:scale(0.8);
        opacity:0;
    }

    to{
        transform:scale(1);
        opacity:1;
    }
}

/* --- BLOQUEO IMAGEN --- */

img{
    pointer-events:none;
    user-select:none;
}

</style>
</head>

<body>

<!-- PANTALLA DE BIENVENIDA -->

<div id="bienvenida">

    <div class="bienvenida-box">

        <img 
        src="https://raw.githubusercontent.com/ComprasMasachapa/etapas-procesos-administrativos-centro-de-salud-masachapa/4bc06fed93039aceb9f6ba583978a3380a21f6cc/LOGO%20MINSA%202026.png" 
        class="bienvenida-logo">

        <h2>SISTEMA DE CONTROL DE FECHAS</h2>

        <button type="button" onclick="entrarSistema()">
            ENTRAR
        </button>

    </div>

</div>

<script>

function entrarSistema(){

    // PEGÁ AQUÍ TU LINK
    window.location.href = "AQUI_TU_LINK";

}

// ENTER PARA ENTRAR
document.addEventListener("keydown", function(event){

    if(event.key === "Enter"){
        entrarSistema();
    }

});

</script>

</body>
</html>
